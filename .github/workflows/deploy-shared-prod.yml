name: Deploy Shared Firebase Infra (PROD)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"

permissions:
  contents: read
  actions: read

jobs:
  deploy-shared-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_ID: swim-coach-support
      FIREBASE_TOOLS_VERSION: 13.35.1
      FIREBASE_CLI_EXPERIMENTS: googleAuth
      STATUS_TOKEN: ${{ secrets.SHARED_INFRA_STATUS_TOKEN }}

    steps:
      - name: Resolve and validate deploy ref
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.ref }}"
          if [ -z "$REF_INPUT" ]; then
            REF_INPUT="${{ github.ref_name }}"
          fi

          case "$REF_INPUT" in
            *"*"*|*"?"*|*"["*|*"]"*)
              echo "Invalid ref '$REF_INPUT': wildcard patterns are not allowed."
              exit 1
              ;;
          esac

          echo "DEPLOY_REF=$REF_INPUT" >> "$GITHUB_ENV"
          echo "Using deploy ref: $REF_INPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate and compose shared artifacts
        run: python3 firebase_infra/tools/manage_infra.py all

      - name: Authenticate to Google Cloud (PROD)
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Export Google credentials for Firebase
        run: |
          CREDS="${{ steps.gcp-auth.outputs.credentials_file_path }}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS" >> "$GITHUB_ENV"
          echo "GOOGLE_GHA_CREDS_PATH=$CREDS" >> "$GITHUB_ENV"
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=$CREDS" >> "$GITHUB_ENV"
          test -f "$CREDS"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Verify GCP auth
        run: |
          set -euo pipefail
          gcloud auth list
          for attempt in 1 2 3; do
            if gcloud auth print-access-token >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to fetch GCP access token after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done
          gcloud config set project "$PROJECT_ID"
          gcloud config get-value project

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@$FIREBASE_TOOLS_VERSION --prefer-offline --no-audit

      - name: Verify Firebase auth context
        run: |
          firebase --version
          firebase projects:list --project "$PROJECT_ID" --non-interactive

      - name: Deploy Firestore + Storage rules (PROD)
        run: |
          firebase deploy \
            --project "$PROJECT_ID" \
            --only firestore:rules,storage \
            --non-interactive

      - name: Publish shared-infra/deployed-prod status to source commit
        if: ${{ env.STATUS_TOKEN != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          CHANGED_METADATA_FILES="$(
            git diff-tree -m --no-commit-id --name-only -r "$GITHUB_SHA" \
              | grep '^firebase_infra/apps/.*/source_metadata\.json$' \
              | sort -u || true
          )"

          if [ -z "$CHANGED_METADATA_FILES" ]; then
            echo "No source metadata updates in this commit. Skipping status publication."
            exit 0
          fi

          for metadata_file in $CHANGED_METADATA_FILES; do
            repo="$(jq -r '.source_repo // empty' "$metadata_file")"
            sha="$(jq -r '.source_sha // empty' "$metadata_file")"

            if [ -z "$repo" ] || [ -z "$sha" ]; then
              echo "Skipping $metadata_file: missing source_repo/source_sha"
              continue
            fi

            payload="$(jq -nc \
              --arg state "success" \
              --arg context "shared-infra/deployed-prod" \
              --arg description "Shared Firebase infra deployed to prod" \
              --arg target_url "$RUN_URL" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}')"

            curl -sS -X POST \
              -H "Authorization: Bearer $STATUS_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/statuses/$sha" \
              -d "$payload" >/dev/null

            echo "Published shared-infra/deployed-prod for $repo@$sha"
          done
